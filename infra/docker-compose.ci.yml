services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ayser
    ports:
      - "5432:5432"

  ml:
    image: ${ML_IMAGE}
    environment:
      ML_MIN_SAMPLES: "1"
    ports:
      - "8010:8010"

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ayser
      ML_SERVICE_URL: http://ml:8010
      JWT_SECRET: test-secret
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
