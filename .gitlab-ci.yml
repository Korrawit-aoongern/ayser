variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  DOCKER_TLS_CERTDIR: "/certs"
  FRONTEND_IMAGE: "${CI_REGISTRY_IMAGE}/infra-frontend:${CI_COMMIT_SHA}"
  BACKEND_IMAGE: "${CI_REGISTRY_IMAGE}/infra-backend:${CI_COMMIT_SHA}"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - pre-build
  - build
  - security
  - test
  - merge
  - deploy

include:
  - template: Security/Secret-Detection.gitlab-ci.yml

# ==========================================
# STAGE: PRE-BUILD (dev only)
# ==========================================
lint_and_unit_test:
  stage: pre-build
  image: node:20.19.0-alpine3.20
  script:
    - apk add --no-cache python3 py3-pip
    - pip install --break-system-packages -r backend/requirements.txt ruff
    - echo "Running backend lint (ruff)..."
    - ruff check backend/app
    - echo "Running backend unit tests (or smoke fallback)..."
    - if [ -d backend/tests/unit ]; then pytest -q backend/tests/unit; else python3 -m compileall backend/app; fi
    - echo "Running frontend lint and type checks..."
    - cd frontend
    - npm ci
    - npm run format
    - npm run lint
    - npm run check
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ==========================================
# STAGE: BUILD (dev only, Docker images)
# ==========================================
build_artifacts:
  stage: build
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
  script:
    - echo "Logging into GitLab Container Registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - echo "Building frontend image..."
    - docker build -f infra/Dockerfile.frontend -t "$FRONTEND_IMAGE" .
    - echo "Building backend image..."
    - docker build -f infra/Dockerfile.backend -t "$BACKEND_IMAGE" .
    - echo "Pushing images..."
    - docker push "$FRONTEND_IMAGE"
    - docker push "$BACKEND_IMAGE"
    - mkdir -p artifacts
    - echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" > artifacts/image-tags.env
    - echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> artifacts/image-tags.env
  artifacts:
    paths:
      - artifacts/image-tags.env
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ==========================================
# STAGE: SECURITY (pre-prod only)
# ==========================================
sonarcloud-check:
  stage: security
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - echo "Running Sonar scanner (stub-ready)..."
    - sonar-scanner
  only:
    - merge_requests
    - master
    - main
    - pre-prod

secret_detection:
  stage: security
  rules:
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'

# ==========================================
# STAGE: TEST
# ==========================================
integration_test:
  stage: test
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
  needs:
    - job: build_artifacts
      artifacts: true
  script:
    - source artifacts/image-tags.env
    - echo "Logging into GitLab Container Registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - echo "Pulling built images..."
    - docker pull "$FRONTEND_IMAGE"
    - docker pull "$BACKEND_IMAGE"
    - echo "Running integration test stub against built images..."
    - echo "spin up containers and run integration suite"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

e2e_test:
  stage: test
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
  script:
    - echo "Running E2E test stub on pre-prod..."
    - echo "pull deployed pre-prod image/tag and run Playwright/Cypress"
  rules:
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'

# ==========================================
# STAGE: MERGE (Draft MR via API)
# ==========================================
promote_to_preprod:
  stage: merge
  image: curlimages/curl:8.10.1
  allow_failure: false
  script:
    - echo "Creating Draft MR from dev -> pre-prod..."
    - |
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"source_branch\":\"dev\",\"target_branch\":\"pre-prod\",\"title\":\"Draft: Promote dev to pre-prod (${CI_COMMIT_SHORT_SHA})\",\"remove_source_branch\":false,\"squash\":false}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

promote_to_main:
  stage: merge
  image: curlimages/curl:8.10.1
  allow_failure: false
  script:
    - echo "Creating Draft MR from pre-prod -> main..."
    - |
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"source_branch\":\"pre-prod\",\"target_branch\":\"main\",\"title\":\"Draft: Promote pre-prod to main (${CI_COMMIT_SHORT_SHA})\",\"remove_source_branch\":false,\"squash\":false}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
  rules:
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'

# ==========================================
# STAGE: DEPLOY (main only)
# ==========================================
deploy_production:
  stage: deploy
  image: alpine:3.20
  script:
    - echo "Deploying frontend to Vercel (stub)..."
    - echo "vercel deploy --prod"
    - echo "Deploying backend to serverless (stub)..."
    - echo "run backend serverless deploy command"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
